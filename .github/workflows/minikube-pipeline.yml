name: Build and Deploy to Minikube

on:
  push:
    branches: [ main, ai-chatops ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-flask
        
    - name: Run tests
      run: |
        python -m pytest tests/ -v

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    name: Build and Deploy to Minikube
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: |
        docker build -t bug-tracker:latest .
        
    - name: Set up Minikube
      uses: medyagh/setup-minikube@latest
      with:
        driver: docker
        kubernetes-version: v1.28.3
        
    - name: Verify Minikube status
      run: |
        minikube status
        kubectl cluster-info
        
    - name: Create namespace
      run: |
        kubectl create namespace devsecops --dry-run=client -o yaml | kubectl apply -f -
        
    - name: Load Docker image into Minikube
      run: |
        minikube image load bug-tracker:latest
        
    - name: Update deployment with local image
      run: |
        sed -i 's|image: gsakshi0809/bug-tracker:33|image: bug-tracker:latest|' manifests/deployment.yaml
        
    - name: Apply Kubernetes manifests
      run: |
        kubectl apply -f manifests/ -n devsecops
        
    - name: Wait for deployment to be ready
      run: |
        kubectl wait --for=condition=available --timeout=300s deployment/bug-tracker -n devsecops
        
    - name: Verify deployment
      run: |
        kubectl get pods -n devsecops
        kubectl get services -n devsecops
        kubectl get deployment -n devsecops
        
    - name: Debug pod details
      run: |
        echo "=== Pod Details ==="
        kubectl get pods -n devsecops -o wide
        echo "=== Pod Events ==="
        kubectl get events -n devsecops --sort-by='.lastTimestamp'
        echo "=== Pod Logs ==="
        kubectl logs -n devsecops -l app=bug-tracker --tail=20
        
    - name: Test application endpoint
      run: |
        # Get the service URL
        SERVICE_URL=$(minikube service bug-tracker-service -n devsecops --url)
        echo "Service URL: $SERVICE_URL"
        
        # Wait a bit for the service to be ready
        sleep 10
        
        # Test the endpoint
        curl -f "$SERVICE_URL" || echo "Service not ready yet"
        
    - name: Cleanup
      if: always()
      run: |
        kubectl delete namespace devsecops --ignore-not-found=true
        minikube stop
